<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Not_KTU_results</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tone.js for sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col min-h-screen text-gray-800">

    <!-- =========== SHARED HEADER =========== -->
    <header class="header-blue text-white shadow-md">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center">
                        <i class="fas fa-graduation-cap text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold">Not_KTU_results e-Governance Portal</h1>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- =========== MAIN CONTENT AREA =========== -->
    <main class="flex-grow container mx-auto p-4 sm:p-6 lg:p-8 flex items-center justify-center">
        <div class="w-full max-w-3xl mx-auto bg-white rounded-lg shadow-lg border border-gray-200">
            <div class="header-blue text-white p-4 rounded-t-lg">
                <h1 class="text-2xl font-bold">Change Your Password</h1>
            </div>
            <div class="p-6 md:p-8 space-y-6">
                <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 rounded-r-lg" role="alert">
                    <p class="font-bold">Security Update Required</p>
                    <p>Your password has expired. Please create a new password that satisfies all security protocols as they appear.</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label for="new-password" class="block text-sm font-medium text-gray-700">New Password</label>
                        <div class="relative">
                            <input type="password" id="new-password" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500 sm:text-sm">
                        </div>
                    </div>
                </div>
                <div id="rule-container" class="bg-gray-50 p-4 rounded-md border border-gray-200 min-h-[50px] space-y-2">
                    <h3 class="text-md font-semibold text-gray-800">Password Requirements:</h3>
                    <ul id="rule-text-container" class="text-left list-none p-0 space-y-2">
                        <!-- Rules will be injected here -->
                    </ul>
                </div>
                <div id="message-box" class="text-center text-base font-medium min-h-[24px]"></div>
                <div class="flex flex-col sm:flex-row gap-4">
                    <button id="save-button" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-md text-lg transition-all duration-300" disabled>
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- =========== SHARED FOOTER =========== -->
    <footer class="footer-blue text-white text-center p-4 mt-auto">
        <p>Copyright &copy; 2025 - Not_KTU_results. Made just for fun ❤️.</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const newPasswordInput = document.getElementById('new-password');
            const ruleTextContainer = document.getElementById('rule-text-container');
            const saveButton = document.getElementById('save-button');
            const messageBox = document.getElementById('message-box');

            let synth, errorSynth, successSynth, newRuleSynth;
            
            // --- Sound Setup ---
            function setupSounds() {
                if (typeof Tone !== 'undefined') {
                    if (Tone.context.state !== 'running') {
                        Tone.start();
                    }
                    synth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.2 } }).toDestination();
                    errorSynth = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.1 } }).toDestination();
                    successSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "sine" } }).toDestination();
                    newRuleSynth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.1 } }).toDestination();
                }
            }
            
            // --- Password Rules ---
            const allRules = [
                { description: "Must be at least 8 characters long.", validate: (pw) => pw.length >= 8 },
                { description: "Must include a number.", validate: (pw) => /\d/.test(pw) },
                { description: "Must include an uppercase letter.", validate: (pw) => /[A-Z]/.test(pw) },
                { description: "Must include one of these: ~ ! @ # $", validate: (pw) => /[~!@#$]/.test(pw) },
                { description: "The numbers in your password must add up to 10.", validate: (pw) => (pw.match(/\d/g) || []).reduce((s, d) => s + parseInt(d), 0) === 10 },
                { description: "Must include the name of a color.", validate: (pw) => ['red', 'green', 'blue', 'yellow', 'black', 'white', 'pink', 'purple', 'orange', 'brown'].some(c => pw.toLowerCase().includes(c)) },
                { description: () => `Must contain the current month (${new Date().toLocaleString('default', { month: 'long' })}).`, validate: (pw) => pw.toLowerCase().includes(new Date().toLocaleString('default', { month: 'long' }).toLowerCase())},
                { description: "Must include a Roman numeral (I, V, X, L, C, D, M).", validate: (pw) => /[IVXLCDM]/i.test(pw) }
            ];

            let activeRules = [allRules[0]];

            function renderRules() {
                ruleTextContainer.innerHTML = '';
                let allCurrentRulesMet = true;

                activeRules.forEach(rule => {
                    const li = document.createElement('li');
                    const desc = typeof rule.description === 'function' ? rule.description() : rule.description;
                    li.textContent = `• ${desc}`;
                    li.className = 'transition-all duration-300 p-2 rounded-md';

                    if (rule.validate(newPasswordInput.value)) {
                        li.classList.add('bg-green-100', 'text-green-800');
                    } else {
                        li.classList.add('bg-red-100', 'text-red-800');
                        allCurrentRulesMet = false;
                    }
                    ruleTextContainer.appendChild(li);
                });

                // If all current rules are met and there are more rules to add, add the next one.
                if (allCurrentRulesMet && activeRules.length < allRules.length) {
                    if (newRuleSynth) newRuleSynth.triggerAttackRelease('C5', '8n', Tone.now());
                    activeRules.push(allRules[activeRules.length]);
                    // Re-render after a short delay to show the new rule
                    setTimeout(renderRules, 200);
                }
                
                // Enable save button only if all rules are active and met
                saveButton.disabled = !(allCurrentRulesMet && activeRules.length === allRules.length);
            }

            function handleSave() {
                if (!saveButton.disabled) {
                    // Play success sound and redirect to the gateway timeout page
                    if (successSynth) successSynth.triggerAttackRelease(["C4", "E4", "G4"], "4n");
                    
                    // Add a small delay to allow the sound to play before redirecting
                    setTimeout(() => {
                        window.location.href = '504.html';
                    }, 500);

                } else {
                    if (errorSynth) errorSynth.triggerAttackRelease('A2', '8n', Tone.now());
                    messageBox.textContent = "Please satisfy all requirements.";
                    messageBox.className = "text-center text-base font-medium text-red-600";
                    newPasswordInput.classList.add('flash-error');
                    setTimeout(() => newPasswordInput.classList.remove('flash-error'), 500);
                }
            }

            newPasswordInput.addEventListener('focus', setupSounds, { once: true });
            newPasswordInput.addEventListener('input', renderRules);
            saveButton.addEventListener('click', handleSave);

            // Initial render
            renderRules();
        });
    </script>
</body>
</html>
