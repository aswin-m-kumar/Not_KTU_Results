<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>504 Gateway Time-out</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #ffffff;
        }
        body {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .container {
            text-align: center;
            margin-top: 2rem;
            font-size: 1.2rem;
            color: #000000;
        }
        /* Delayed fade-in: hidden for 10s, then fades in using the fadeIn keyframe from style.css */
        .delayed-fade-in {
            opacity: 0;
            animation: fadeIn 0.6s ease-out 10s forwards;
        }
    </style>
</head>
<body>
    <div class="container delayed-fade-in">
        <h1>504 Gateway Time-out</h1>
    </div>
</body>
</html>
